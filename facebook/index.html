<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Website Development Request</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #667eea, #764ba2);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
      }

      .form-container {
        background: white;
        padding: 30px;
        border-radius: 15px;
        width: 100%;
        max-width: 420px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      }

      h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #333;
      }

      .form-group {
        margin-bottom: 15px;
      }

      label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
        color: #444;
      }

      input,
      select,
      textarea {
        width: 100%;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #ccc;
        font-size: 14px;
      }

      textarea {
        resize: none;
        height: 80px;
      }

      .submit-btn {
        width: 100%;
        padding: 12px;
        background: #667eea;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
      }

      .submit-btn:hover {
        background: #5a67d8;
      }

      .logo {
        text-align: center;
        margin-bottom: 15px;
      }

      .logo img {
        width: 60px;
        height: 60px;
      }
    </style>
  </head>

  <body>
    <div class="form-container">
      <div class="logo">
        <img src="https://cdn-icons-png.flaticon.com/512/1055/1055687.png" />
      </div>

      <h2>Website Development Request</h2>

      <form id="contactForm">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="name" placeholder="Enter your name" required />
        </div>

        <div class="form-group">
          <label>Email</label>
          <input
            type="email"
            id="email"
            placeholder="Enter your email"
            required
          />
        </div>

        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" id="phone" placeholder="Enter your phone number" />
        </div>

        <div class="form-group">
          <label>Service Needed</label>
          <select id="service">
            <option value="">Select Service</option>
            <option value="portfolio">Portfolio Website</option>
            <option value="business">Business Website</option>
            <option value="ecommerce">E-commerce Website</option>
            <option value="webapp">Web Application</option>
            <option value="redesign">Website Redesign</option>
            <option value="android">Android Mobile App</option>
            <option value="reactnative">React Native Mobile App</option>
            <option value="ios">iOS Mobile App</option>
            <option value="fullstack">
              Full Stack Web + Mobile App Package
            </option>
            <option value="uiux">UI/UX Design</option>
            <option value="seo">SEO Optimization</option>
            <option value="maintenance">Website Maintenance</option>
            <option value="api">API Development</option>
            <option value="custom">Custom Software Development</option>
            <option value="school">School Website</option>
            <option value="college">College Website</option>
            <option value="hotel">Hotel Website</option>
            <option value="hospital">Hospital Website</option>
            <option value="restaurant">Restaurant Website</option>
            <option value="hostel">Hostel Website</option>
            <option value="pg">PG / Paying Guest Website</option>
          </select>
        </div>

        <div class="form-group">
          <label>Budget (₹)</label>
          <input type="number" id="budget" placeholder="Enter your budget" />
        </div>

        <div class="form-group">
          <label>Project Details</label>
          <textarea id="message" placeholder="Describe your project"></textarea>
        </div>

        <button type="submit" class="submit-btn">Submit Request</button>
      </form>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const form = document.getElementById("contactForm");

        form.addEventListener("submit", function (e) {
          e.preventDefault();

          const name = document.getElementById("name").value.trim();
          const email = document.getElementById("email").value.trim();
          const phone = document.getElementById("phone").value.trim();
          const service = document.getElementById("service").value;
          const budget = document.getElementById("budget").value;
          const message = document.getElementById("message").value;

          const text = `New Website Request:
Name: ${name}
Email: ${email}
Phone: ${phone}
Service: ${service}
Budget: ₹${budget}
Project: ${message}`;

          const whatsappURL =
            "https://wa.me/919529525004?text=" + encodeURIComponent(text);

          window.location.href = whatsappURL;
        });
      });
    </script>
  </body>
</html>
